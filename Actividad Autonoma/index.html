<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Catálogo de servicios dinámico" />
  <title>Catálogo de Servicios</title>
  <link rel="stylesheet" href="CSS/styles.css" />
</head>

<body>

  <header class="encabezado">
    <h1>Catálogo de Servicios</h1>
    <p class="subtitulo">Explora nuestros servicios disponibles</p>
  </header>

  <main class="contenedor-principal">

    <div class="barra-filtro">

      <input type="text" id="inputBusqueda" placeholder="Buscar servicio..." aria-label="Buscar servicios" />

      <select id="selectCategoria" aria-label="Filtrar por categoría">
        <option value="todas">Todas las categorías</option>
        <option value="Diseño">Diseño</option>
        <option value="Desarrollo">Desarrollo</option>
        <option value="Marketing">Marketing</option>
        <option value="Soporte">Soporte</option>
      </select>

      <select id="selectOrden" aria-label="Ordenar por">
        <option value="defecto">Ordenar por...</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="nombre-asc">Nombre: A → Z</option>
        <option value="nombre-desc">Nombre: Z → A</option>
      </select>

    </div>

    <div class="barra-precio">
      <label for="rangoPrecio" class="label-precio">
        Precio máximo: <strong id="valorPrecio">S/ 3000</strong>
      </label>
      <input type="range" id="rangoPrecio" min="80" max="3000" step="20" value="3000"
        aria-label="Filtrar por precio máximo" />
      <div class="limites-slider">
        <span>S/ 80</span>
        <span>S/ 3000</span>
      </div>
    </div>

    <div class="barra-acciones">
      <p class="contador-resultados" id="contadorResultados"></p>
      <button id="btnLimpiar" class="btn-limpiar" aria-label="Limpiar todos los filtros">
        ✕ Limpiar filtros
      </button>
    </div>

    <div class="galeria-tarjetas" id="galeriaServicios">
    </div>

    <div class="sin-resultados oculto" id="sinResultados">
      <span>😕</span>
      <p>No se encontraron servicios con ese criterio.</p>
    </div>

  </main>

  <div class="overlay-modal oculto" id="overlayModal">
    <div class="modal-detalle" id="modalDetalle" role="dialog" aria-modal="true">
      <button class="btn-cerrar-modal" id="btnCerrarModal" aria-label="Cerrar">✕</button>
      <div class="modal-icono" id="modalIcono"></div>
      <h2 class="modal-titulo" id="modalTitulo"></h2>
      <span class="modal-categoria" id="modalCategoria"></span>
      <div class="modal-estrellas" id="modalEstrellas"></div>
      <p class="modal-descripcion" id="modalDescripcion"></p>
      <div class="modal-precio" id="modalPrecio"></div>
      <button class="btn-contratar" id="btnContratar">Contratar servicio</button>
    </div>
  </div>

  <div class="toast oculto" id="toastNotificacion">
    ✅ ¡Servicio contratado correctamente!
  </div>

  <footer class="pie-pagina">
    <p>Catálogo de Servicios &copy; 2026</p>
  </footer>

  <script src="app.js"></script>

</body>

</html>
